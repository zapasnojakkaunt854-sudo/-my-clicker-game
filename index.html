<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шлёпа Кликер 2: Пельменная Империя</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5ebd7;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 5px;
            color: #4a3b32;
        }
        .score-board {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
            color: #2c1e15;
        }
        .stats {
            font-size: 16px;
            color: #776a5f;
            margin-bottom: 20px;
        }
        .click-area {
            position: relative;
            display: inline-block;
            margin: 20px 0;
            cursor: pointer;
        }
        .click-area img {
            width: 200px;
            height: auto;
            transition: transform 0.1s ease;
            -webkit-user-drag: none;
        }
        .click-area img:active {
            transform: scale(0.95);
        }
        .btn {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
            margin: 10px;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-music {
            background-color: #ff5722;
        }
        .shop {
            margin-top: 30px;
            border-top: 2px dashed #e0d5c1;
            padding-top: 20px;
            text-align: left;
        }
        .shop-title {
            font-size: 22px;
            color: #4a3b32;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }
        .shop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #faf6ee;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #ebdcb9;
        }
        .shop-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
        }
        .item-info {
            flex-grow: 1;
        }
        .item-name {
            font-weight: bold;
            font-size: 16px;
            color: #2c1e15;
        }
        .item-cost {
            font-size: 14px;
            color: #ff9800;
            font-weight: bold;
        }
        #golden-dumpling {
            position: absolute;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: none;
            z-index: 100;
            animation: float 3s ease-in-out infinite;
            -webkit-user-drag: none;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-music" id="music-btn" onclick="toggleMusic()">🎵 Включить музыку</button>

    <h1 id="location-text">Локация: Обычная комната</h1>
    <div class="score-board">Монеты: <span id="money-display">0</span></div>
    <div class="stats">Клик: +<span id="cpc-display">1</span> | В секунду (CPS): +<span id="cps-display">0</span></div>

    <div class="click-area">
        <img id="shlepa-img" src="shlepa.jpg" alt="Большой Шлёпа" onclick="clickShlepa(event)">
    </div>

    <div class="shop">
        <div class="shop-title">Гардероб Шлёпы</div>
        
        <div class="shop-item">
            <img src="золотой пельмень.jpg" alt="Скин Пельмень">
            <div class="item-info">
                <div class="item-name">Скин "Шлёпа-Пельмень"</div>
                <div class="item-cost">Цена: 10000</div>
            </div>
            <button class="btn" id="skin-btn" onclick="buySkin()">Купить</button>
        </div>
    </div>
</div>

<img id="golden-dumpling" src="золотой пельмень.jpg" alt="Золотой Пельмень" onclick="catchGolden()">

<audio id="click-sound" src="click.mp3"></audio>
<audio id="golden-sound" src="golden.mp3"></audio>

<script>
    // Игровые переменные
    let money = 0;
    let baseCpc = 1;
    let skinMultiplier = 1;
    let cps = 0;
    let hasSkin = false;
    let isSkinActive = false;
    let locStage = 1;

    // Музыкальная система
    let isMusicPlaying = false;
    let bgMusic = new Audio('cosmos.jpg'); // Загружаем музыку (у тебя это файл cosmos.jpg)
    bgMusic.loop = true;

    // Элементы страницы
    const moneyDisplay = document.getElementById('money-display');
    const cpcDisplay = document.getElementById('cpc-display');
    const cpsDisplay = document.getElementById('cps-display');
    const shlepaImg = document.getElementById('shlepa-img');
    const skinBtn = document.getElementById('skin-btn');
    const locationText = document.getElementById('location-text');
    const golden = document.getElementById('golden-dumpling');
    const musicBtn = document.getElementById('music-btn');

    // Функция включения/выключения музыки
    function toggleMusic() {
        if (!isMusicPlaying) {
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.innerText = "⏸ Выключить музыку";
            }).catch(err => {
                console.log("Ошибка воспроизведения музыки: ", err);
                alert("Кликни сначала по экрану, а потом нажимай кнопку музыки!");
            });
        } else {
            bgMusic.pause();
            isMusicPlaying = false;
            musicBtn.innerText = "🎵 Включить музыку";
        }
    }

    // Звуки эффектов
    function playSound(id) {
        const sound = document.getElementById(id);
        if (sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Браузер заблокировал звук клика до первого взаимодействия"));
        }
    }

    function getFinalCpc() {
        return baseCpc * skinMultiplier;
    }

    function getFinalCps() {
        return cps;
    }

    function updateUI() {
        moneyDisplay.innerText = Math.floor(money);
        cpcDisplay.innerText = getFinalCpc();
        cpsDisplay.innerText = getFinalCps();
        
        // Обновление локаций по ходу игры
        if (money >= 5000 && locStage === 1) {
            locStage = 2;
            locationText.innerText = "Локация: Пельменная Фабрика";
            document.body.style.backgroundColor = "#e0d5c1";
        } else if (money >= 20000 && locStage === 2) {
            locStage = 3;
            locationText.innerText = "Локация: Космическая Империя";
            document.body.style.backgroundColor = "#1a1a2e";
            document.body.style.color = "#ffffff";
        }

        // Обновление кнопки скина
        if (hasSkin) {
            if (isSkinActive) {
                skinBtn.innerText = "Снять";
                skinBtn.style.backgroundColor = "#757575";
            } else {
                skinBtn.innerText = "Надеть";
                skinBtn.style.backgroundColor = "#4caf50";
            }
        }
    }

    // Клик по Шлёпе
    function clickShlepa(event) {
        playSound('click-sound');
        money += getFinalCpc();
        updateUI();
        
        // Попытка запустить музыку при первом клике, если кнопка была нажата
        if (isMusicPlaying && bgMusic.paused) {
            bgMusic.play();
        }
    }

    // Покупка/надевание скина
    function buySkin() {
        if (!hasSkin) {
            if (money >= 10000) {
                money -= 10000;
                hasSkin = true;
                isSkinActive = true;
                skinMultiplier = 2;
                shlepaImg.src = "pelmen_shlepa.jpg";
                alert("Ура! Ты купил скин Шлёпа-Пельмень! Клик удвоен!");
            } else {
                alert("Недостаточно монет! Нужно 10000 пельменных монет.");
            }
        } else {
            if (isSkinActive) {
                isSkinActive = false;
                skinMultiplier = 1;
                shlepaImg.src = "shlepa.jpg";
            } else {
                isSkinActive = true;
                skinMultiplier = 2;
                shlepaImg.src = "pelmen_shlepa.jpg";
            }
        }
        updateUI();
    }

    // Спавн Золотого Пельменя
    function spawnGolden() {
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 100);
        golden.style.left = x + 'px';
        golden.style.top = y + 'px';
        golden.style.display = 'block';
        setTimeout(() => { golden.style.display = 'none'; }, 6000);
    }

    // Поймали Золотой Пельмень
    function catchGolden() {
        golden.style.display = 'none';
        playSound('golden-sound');
        let bonus = (getFinalCps() + getFinalCpc()) * 15;
        money += bonus;
        updateUI();
        alert("Золотой Пельмень принес тебе +" + bonus + " монет!");
    }

    // Таймер пассивного дохода и спавна пельменя
    setInterval(function() {
        money += getFinalCps();
        updateUI();
    }, 1000);

    setInterval(function() {
        if (Math.random() > 0.5) {
            spawnGolden();
        }
    }, 15000);
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('Service Worker Registered'));
  }
</script>

</body>
</html>
